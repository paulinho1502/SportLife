<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="cadastro">
        <div class="cadastro-container">
            <div class="card-login">

                <p><a href="index.html">Ínicio</a></p>
                <h1>Cadastre um usuario</h1>

                <div class="campo">
                    <span>Nome:</span>
                    <input id="inp_nome" type="text" placeholder="Seu nome">
                </div>

                 <div class="campo">
                    <span>E-mail:</span>
                    <input id="inp_email" type="email" placeholder="seuemail@gmail.com">
                </div>

                 <div class="campo">
                    <span>Senha:</span>
                    <input id="inp_senha" type="password" placeholder="Sua senha">
                </div>
                 <div class="campo">
                    <span>Confirmar Senha:</span>
                    <input id="inp_csenha" type="password" placeholder="Confirme sua senha">
                </div>

                <button class="button" onclick="cadastrar()">Cadastrar</button>

                <p>Ja tem uma conta? <a href="login.html">Login</a></p>
            </div>
        </div>
    </section>
</body>
</html>
<script>
    function cadastrar() {
        let nome = inp_nome.value
        let email = inp_email.value
        let senha = inp_senha.value
        let csenha = inp_csenha.value

        if (nome == "" || email == "" || senha == "" || csenha == "") {
            alert('Preencha todos os campos')
        } else if (csenha != senha) {
            alert('As senhas precisam ser iguais')
        } else if (!email.includes("@") || !email.includes(".")) {
            alert('O Email precisa conter @ e .')
        } else if (senha.length < 8) {
            alert('A senha deve ter pelo menos 8 caracteres')
        } else if (!senha.includes("!") || !senha.includes("@")  || !senha.includes("#") ||
                    !senha.includes("$") || !senha.includes("%") || !senha.includes("&") ||
                    !senha.includes("*") || !senha.includes("_") || !senha.includes("-") ||
                    !senha.includes("/")) {
                        alert('A senha precisa conter pelo menos um caractere especial')
                    } else {
                        alert('Cadastro realizado com sucesso')
                    }
                    
                   
                }

</script>
