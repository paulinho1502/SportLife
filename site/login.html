<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="login">
        <div class="cadastro-container">
            <div class="card-login">
                <h1>Bem vindo</h1>

                 <div class="campo">
                    <span>E-mail:</span>
                    <input id="inp_email" type="email" placeholder="seuemail@gmail.com">
                </div>

                 <div class="campo">
                    <span>Senha:</span>
                    <input id="inp_senha" type="password" placeholder="Sua senha">
                </div>
                <button class="button" onclick="entrar()">Entrar</button>

                <p>Não possui uma conta? <a href="cadastro.html">cadastrar</a></p>
            </div>
        </div>
    </section>
</body>
</html>
